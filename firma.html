<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Firmar PDF - Pulpi Tools</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script>pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';</script>
    <script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg: #f6f5ff;
            --surface: #ffffff;
            --surface-2: #f9f8ff;
            --border: #e8e5f5;
            --border-2: #d4d0ea;
            --text: #111111;
            --text-2: #555555;
            --text-3: #aaaaaa;
            --accent: #6d28d9;
            --accent-l: #7c3aed;
            --accent-xl: #8b5cf6;
            --accent-bg: #ede9fe;
            --accent-bd: #c4b5fd;
            --success: #16a34a;
            --success-bg: #dcfce7;
            --error: #ef4444;
            --error-bg: #fef2f2;
            --nav-h: 60px;
            --r: 14px;
            --shadow: 0 1px 3px rgba(0,0,0,.07), 0 0 0 1px rgba(0,0,0,.04);
            --shadow-h: 0 16px 40px rgba(0,0,0,.13), 0 4px 12px rgba(0,0,0,.06);
            --primary: var(--accent);
            --primary-hover: var(--accent-l);
        }

        [data-theme="dark"] {
            --bg: #1c1c1e;
            --surface: #2c2c2e;
            --surface-2: #3a3a3c;
            --border: #3a3a3c;
            --border-2: #48484a;
            --text: #f2f2f7;
            --text-2: #aeaeb2;
            --text-3: #636366;
            --accent: #a78bfa;
            --accent-l: #8b5cf6;
            --accent-xl: #c4b5fd;
            --accent-bg: rgba(167,139,250,.13);
            --accent-bd: rgba(167,139,250,.3);
            --success-bg: rgba(22,163,74,.14);
            --error-bg: rgba(239,68,68,.15);
            --shadow: 0 1px 4px rgba(0,0,0,.4), 0 0 0 1px rgba(255,255,255,.04);
            --shadow-h: 0 16px 40px rgba(0,0,0,.55), 0 4px 12px rgba(0,0,0,.3);
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: var(--nav-h);
            -webkit-font-smoothing: antialiased;
            transition: background .25s, color .25s;
            overscroll-behavior: none;
            overflow-x: hidden;
        }

        .bg-blob { position: fixed; border-radius: 50%; z-index: -1; pointer-events: none; }
        .blob-1 { width: 500px; height: 500px; top: -160px; right: -140px; background: radial-gradient(circle, rgba(109,40,217,.09) 0%, transparent 70%); filter: blur(55px); }
        .blob-2 { width: 420px; height: 420px; bottom: -120px; left: -120px; background: radial-gradient(circle, rgba(22,163,74,.09) 0%, transparent 70%); filter: blur(55px); }
        [data-theme="dark"] .blob-1 { background: radial-gradient(circle, rgba(109,40,217,.05) 0%, transparent 70%); }
        [data-theme="dark"] .blob-2 { background: radial-gradient(circle, rgba(22,163,74,.05) 0%, transparent 70%); }
        .bg-dots {
            position: fixed; inset: 0; z-index: -1; pointer-events: none;
            background-image: radial-gradient(circle, rgba(109,40,217,.14) 1px, transparent 1px);
            background-size: 24px 24px; opacity: .22;
            -webkit-mask-image: radial-gradient(ellipse 70% 60% at 50% 30%, black 20%, transparent 100%);
            mask-image: radial-gradient(ellipse 70% 60% at 50% 30%, black 20%, transparent 100%);
        }
        [data-theme="dark"] .bg-dots { opacity: .06; }

        .navbar {
            position: fixed; top: 0; left: 0; right: 0; height: var(--nav-h); z-index: 200;
            background: var(--surface); border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: center;
            padding: 0 24px; transition: background .25s, border-color .25s;
        }
        .nav-inner { width: 100%; max-width: 860px; display: flex; align-items: center; justify-content: space-between; }
        .brand {
            display: flex; align-items: center; gap: 9px; text-decoration: none; color: var(--text);
            font-size: 1.05rem; font-weight: 700; letter-spacing: -.02em;
        }
        .brand span { color: var(--accent); }
        .brand-mark { width: 30px; height: 30px; border-radius: 7px; background: var(--accent); display: flex; align-items: center; justify-content: center; }
        .brand-mark svg { width: 17px; height: 17px; }
        .nav-right { display: flex; align-items: center; gap: 8px; }
        .theme-btn {
            width: 34px; height: 34px; border-radius: 8px; border: 1px solid var(--border);
            background: var(--surface-2); display: flex; align-items: center; justify-content: center;
            cursor: pointer; color: var(--text-2); font-size: .85rem; transition: all .18s;
        }
        .theme-btn:hover { background: var(--accent-bg); color: var(--accent); border-color: var(--accent-bd); }
        .btn-back {
            display: flex; align-items: center; gap: 6px; padding: 7px 14px; border-radius: 8px;
            border: 1.5px solid var(--border-2); background: transparent;
            font-size: .84rem; font-weight: 600; color: var(--text-2); text-decoration: none; transition: all .18s;
        }
        .btn-back:hover { border-color: var(--accent-bd); color: var(--accent); background: var(--accent-bg); }

        .page-top { width: 100%; max-width: 860px; padding: 36px 24px 0; animation: fadeUp .4s ease both; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .tool-badge {
            display: inline-flex; align-items: center; gap: 7px; padding: 4px 12px; border-radius: 50px;
            background: var(--success-bg); border: 1px solid rgba(22,163,74,.22);
            font-size: .72rem; font-weight: 700; letter-spacing: .06em; text-transform: uppercase;
            color: var(--success); margin-bottom: 12px;
        }
        .page-top h1 {
            font-size: clamp(1.6rem, 3vw, 2.2rem);
            font-weight: 700; letter-spacing: -.025em; line-height: 1.15;
            color: var(--text); margin-bottom: 8px;
        }
        .page-top h1 span { color: var(--accent); }
        .page-top > p { font-size: .92rem; color: var(--text-2); line-height: 1.65; max-width: 560px; }

        .container { width: 100%; max-width: 860px; padding: 28px 24px 48px; animation: fadeUp .4s .08s ease both; }
        .tool-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 28px;
            box-shadow: var(--shadow);
            transition: background .25s, border-color .25s;
        }

        .inputs-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .upload-box {
            width: 100%;
            border: 2px dashed var(--border-2);
            border-radius: var(--r);
            padding: 20px;
            background-color: var(--surface-2);
            cursor: pointer;
            transition: border-color .2s, background .2s;
            text-align: left;
            display: flex;
            align-items: center;
            gap: 12px;
            box-sizing: border-box;
            min-height: 88px;
        }
        .upload-box:hover,
        .upload-box:active {
            border-color: var(--accent-xl);
            background-color: var(--accent-bg);
        }

        .icon-main {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            background: var(--accent-bg);
            border: 1px solid var(--accent-bd);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--accent);
            font-size: 1.2rem;
            flex-shrink: 0;
        }

        .upload-text h4 {
            margin: 0;
            color: var(--text);
            font-size: .9rem;
            font-weight: 700;
        }
        .upload-text p {
            margin: 4px 0 0 0;
            font-size: .78rem;
            color: var(--text-3);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            max-width: 160px;
        }
        .file-check {
            margin-left: auto;
            color: var(--success);
            display: none;
            font-size: 1.18rem;
        }

        #preview-stage-container {
            display: none;
            margin-top: 18px;
            background: var(--surface-2);
            padding: 16px;
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid var(--border);
        }
        .preview-tip {
            color: var(--text-2);
            font-size: .8rem;
            margin: 0 0 12px;
        }
        .preview-tip i {
            color: var(--accent);
        }

        #pdf-container {
            position: relative;
            box-shadow: var(--shadow-h);
            margin: 0 auto;
            line-height: 0;
            background: #fff;
            user-select: none;
            max-width: 100%;
            border-radius: 10px;
            overflow: hidden;
        }

        #pdf-render { width: 100%; height: auto; display: block; }

        #signature-ghost {
            position: absolute;
            height: auto;
            border: 2px dashed var(--accent);
            background: rgba(109, 40, 217, .18);
            cursor: grab;
            display: none;
            top: 50%;
            left: 50%;
            transform: translate(0, 0);
            z-index: 10;
            touch-action: none;
            border-radius: 8px;
        }
        #signature-ghost img { width: 100%; height: 100%; pointer-events: none; display: block; }

        .resize-handle {
            width: 24px;
            height: 24px;
            background: var(--accent);
            position: absolute;
            right: -12px;
            bottom: -12px;
            border-radius: 50%;
            border: 3px solid #fff;
            z-index: 20;
            box-shadow: 0 2px 6px rgba(0,0,0,.24);
        }

        .final-controls {
            margin-top: 18px;
            padding-top: 18px;
            border-top: 1px solid var(--border);
        }
        .check-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 14px;
            color: var(--text-2);
            font-size: .9rem;
        }
        #checkAllPages {
            width: 18px;
            height: 18px;
            accent-color: var(--accent);
        }
        .btn-action {
            width: 100%;
            padding: 13px 18px;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-family: 'Inter', sans-serif;
            font-weight: 700;
            font-size: .95rem;
            cursor: pointer;
            box-shadow: 0 2px 10px rgba(109,40,217,.25);
            transition: background .15s, box-shadow .15s, transform .15s;
        }
        .btn-action:hover:not(:disabled) { background: var(--accent-l); box-shadow: 0 4px 18px rgba(109,40,217,.35); transform: translateY(-1px); }
        .btn-action:disabled { background: #8e8e93; box-shadow: none; cursor: not-allowed; transform: none; }
        #status {
            margin-top: 10px;
            font-weight: 700;
            font-size: .88rem;
            text-align: center;
        }

        input[type="file"] { display: none; }

        #custom-alert {
            position: fixed; inset: 0;
            background: rgba(0,0,0,.5);
            z-index: 500;
            display: none;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(4px);
            padding: 20px;
        }
        .alert-content {
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 30px 24px;
            border-radius: 18px;
            text-align: center;
            width: 100%;
            max-width: 360px;
            box-shadow: 0 24px 60px rgba(0,0,0,.18);
            animation: popIn .26s cubic-bezier(.34,1.3,.64,1);
        }
        @keyframes popIn { from { transform: scale(.86); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .alert-icon {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: var(--error-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 12px;
            font-size: 1.5rem;
            color: var(--error);
        }
        .alert-title { font-size: 1.05rem; font-weight: 700; margin-bottom: 8px; color: var(--text); }
        .alert-msg { color: var(--text-2); margin-bottom: 18px; font-size: .88rem; }
        .alert-btn {
            background: var(--accent);
            color: #fff;
            border: none;
            padding: 10px 25px;
            border-radius: 9px;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            transition: background .15s;
        }
        .alert-btn:hover { background: var(--accent-l); }

        @media (max-width: 860px) {
            .inputs-grid { grid-template-columns: 1fr; }
        }
        @media (max-width: 600px) {
            .page-top, .container { padding-left: 16px; padding-right: 16px; }
            .tool-card { padding: 22px 16px; }
            .upload-text p { max-width: 130px; }
        }
    </style>

<body>
    <div class="bg-blob blob-1"></div>
    <div class="bg-blob blob-2"></div>
    <div class="bg-dots"></div>

    <nav class="navbar">
      <div class="nav-inner">
        <a href="index.html" class="brand">
          <div class="brand-mark">
            <svg viewBox="0 0 18 18" fill="none"><ellipse cx="9" cy="7.5" rx="5" ry="5.5" fill="#c4b5fd"/><circle cx="6.8" cy="6.5" r="1.8" fill="white"/><circle cx="11.2" cy="6.5" r="1.8" fill="white"/><circle cx="7.2" cy="7" r="1.1" fill="#3b0764"/><circle cx="11.6" cy="7" r="1.1" fill="#3b0764"/><circle cx="7.6" cy="6.4" r=".45" fill="white"/><circle cx="12" cy="6.4" r=".45" fill="white"/><path d="M7.5 9.5 Q9 11 10.5 9.5" stroke="#3b0764" stroke-width=".85" stroke-linecap="round" fill="none"/><path d="M5 12 Q4.2 14.5 4 17" stroke="#c4b5fd" stroke-width="1.6" stroke-linecap="round" fill="none"/><path d="M9 12.5 Q9 15 9 17.5" stroke="#a78bfa" stroke-width="1.5" stroke-linecap="round" fill="none"/><path d="M13 12 Q13.8 14.5 14 17" stroke="#c4b5fd" stroke-width="1.6" stroke-linecap="round" fill="none"/></svg>
          </div>
          Pulpi<span>Tools</span>
        </a>
        <div class="nav-right">
          <button class="theme-btn" id="themeToggleBtn" title="Cambiar tema"><i id="themeIcon" class="fa-solid fa-moon"></i></button>
          <a href="index.html" class="btn-back"><i class="fa-solid fa-arrow-left" style="font-size:.78rem;"></i> Volver</a>
        </div>
      </div>
    </nav>

    <div class="page-top">
      <div class="tool-badge"><i class="fa-solid fa-file-signature"></i> Firma</div>
      <h1>Firmar <span>PDF</span></h1>
      <p>Sube tu documento PDF y tu firma en imagen para posicionarla exactamente donde la necesites.</p>
    </div>

    <div class="container">
      <div class="tool-card main-card">
        <div class="inputs-grid">
          <div class="upload-box" id="drop-zone-pdf" onclick="document.getElementById('pdfInput').click()">
              <i class="fas fa-file-pdf icon-main"></i>
              <div class="upload-text"><h4>Documento PDF</h4><p id="pdfName">Seleccionar...</p></div>
              <i class="fas fa-check-circle file-check" id="pdfCheck"></i>
          </div>
          <input type="file" id="pdfInput" accept=".pdf" onchange="handleFileSelect(this, 'pdf')">

          <div class="upload-box" id="drop-zone-firma" onclick="document.getElementById('firmaInput').click()">
              <i class="fas fa-signature icon-main"></i>
              <div class="upload-text"><h4>Tu Firma</h4><p id="firmaName">Imagen...</p></div>
              <i class="fas fa-check-circle file-check" id="firmaCheck"></i>
          </div>
          <input type="file" id="firmaInput" accept="image/png, image/jpeg" onchange="handleFileSelect(this, 'firma')">
        </div>

        <div id="preview-stage-container">
          <p class="preview-tip"><i class="fas fa-hand-pointer"></i> Arrastra la firma con el dedo para colocarla.</p>
          <div id="pdf-container">
              <canvas id="pdf-render"></canvas>
              <div id="signature-ghost">
                  <img id="ghost-img" src="">
                  <div class="resize-handle" id="resizer"></div>
              </div>
          </div>
        </div>

        <div class="final-controls">
          <div class="check-row">
              <input type="checkbox" id="checkAllPages">
              <label for="checkAllPages">Firmar en <b>TODAS</b> las paginas</label>
          </div>
          <button id="btnFirmar" class="btn-action" onclick="enviarFirma()" disabled>Firmar Documento</button>
          <p id="status"></p>
        </div>
      </div>
    </div>

    <div id="custom-alert">
      <div class="alert-content">
          <div class="alert-icon"><i class="fas fa-exclamation-circle"></i></div>
          <h3 class="alert-title">Archivo no valido</h3>
          <p id="alert-message" class="alert-msg">Por favor verifica el formato.</p>
          <button class="alert-btn" onclick="closeAlert()">Entendido</button>
      </div>
    </div>

    <script>
    (function(){
      const savedTheme = localStorage.getItem('pulpi_theme');
      const prefersDark = window.matchMedia('(prefers-color-scheme:dark)').matches;
      applyTheme(savedTheme || (prefersDark ? 'dark' : 'light'));
    })();

    function applyTheme(theme){
      document.documentElement.setAttribute('data-theme', theme);
      localStorage.setItem('pulpi_theme', theme);
      const icon = document.getElementById('themeIcon');
      if (icon) icon.className = theme === 'dark' ? 'fa-solid fa-sun' : 'fa-solid fa-moon';
    }

    function toggleTheme(){
      const current = document.documentElement.getAttribute('data-theme');
      applyTheme(current === 'dark' ? 'light' : 'dark');
    }

    document.addEventListener('DOMContentLoaded', function(){
      const btn = document.getElementById('themeToggleBtn');
      if (btn) btn.addEventListener('click', toggleTheme);
    });
    </script>
<script>
        let pdfDoc = null;
        const canvas = document.getElementById('pdf-render');
        const ctx = canvas.getContext('2d');
        const ghost = document.getElementById('signature-ghost');
        const container = document.getElementById('pdf-container');
        const previewStage = document.getElementById('preview-stage-container');
        const resizer = document.getElementById('resizer');

        // Variables de estado
        let isDragging = false, isResizing = false;
        let dragOffset = { x: 0, y: 0 };
        let startX, startWidth;
        // Aspect Ratio real de la imagen de firma
        let firmaAspectRatio = 1; 

        // --- MANEJO DE ARCHIVOS Y ERRORES ---
        function showAlert(msg) {
            document.getElementById('alert-message').innerText = msg;
            document.getElementById('custom-alert').style.display = 'flex';
        }

        function closeAlert() {
            document.getElementById('custom-alert').style.display = 'none';
        }

        function handleFileSelect(input, type) {
            const file = input.files[0];
            if (!file) return;

            if (type === 'firma') {
                const validTypes = ['image/png', 'image/jpeg', 'image/jpg'];
                if (!validTypes.includes(file.type)) {
                    input.value = ""; // Limpiar input
                    showAlert("Solo se permiten imágenes PNG o JPG para la firma.");
                    return;
                }
                loadFirmaPreview(file);
            } else if (type === 'pdf') {
                if (file.type !== 'application/pdf') {
                    input.value = "";
                    showAlert("Por favor sube un archivo PDF válido.");
                    return;
                }
                loadPdfPreview(file);
            }
        }

        // --- Drag & Drop UI ---
        function setupDragDropUI(zoneId, inputId, type) {
            const zone = document.getElementById(zoneId);
            const input = document.getElementById(inputId);
            zone.addEventListener('dragover', e => { e.preventDefault(); zone.style.background = '#d1fae5'; });
            zone.addEventListener('dragleave', e => { e.preventDefault(); zone.style.background = '#f8fafc'; });
            zone.addEventListener('drop', (e) => {
                e.preventDefault();
                zone.style.background = '#f8fafc';
                if (e.dataTransfer.files.length > 0) {
                    input.files = e.dataTransfer.files;
                    handleFileSelect(input, type);
                }
            });
        }
        setupDragDropUI('drop-zone-pdf', 'pdfInput', 'pdf');
        setupDragDropUI('drop-zone-firma', 'firmaInput', 'firma');


        async function loadPdfPreview(file) {
            document.getElementById('pdfName').innerText = file.name;
            document.getElementById('pdfCheck').style.display = 'block';
            previewStage.style.display = 'block';
            
            const fileReader = new FileReader();
            fileReader.onload = async function () {
                const typedarray = new Uint8Array(this.result);
                pdfDoc = await pdfjsLib.getDocument(typedarray).promise;
                renderPage(pdfDoc.numPages);
            };
            fileReader.readAsArrayBuffer(file);
            checkReady();
        }

        async function renderPage(num) {
            const page = await pdfDoc.getPage(num);
            const containerWidth = document.querySelector('.main-card').clientWidth - 40; 
            const viewportBase = page.getViewport({ scale: 1.0 });
            
            let scale = containerWidth / viewportBase.width;
            if (scale > 1.5) scale = 1.5; 

            const viewport = page.getViewport({ scale: scale });
            canvas.height = viewport.height;
            canvas.width = viewport.width;
            
            await page.render({ canvasContext: ctx, viewport: viewport }).promise;
            
            container.style.width = canvas.width + "px";
            container.style.height = canvas.height + "px";
            
            if (document.getElementById('firmaInput').files.length > 0) {
                resetGhostPosition();
                ghost.style.display = 'block';
            }
        }

        function loadFirmaPreview(file) {
            document.getElementById('firmaName').innerText = file.name;
            document.getElementById('firmaCheck').style.display = 'block';
            
            const reader = new FileReader();
            reader.onload = function (e) {
                const img = document.getElementById('ghost-img');
                img.src = e.target.result;
                
                // Calcular Aspect Ratio real para que no se deforme
                const tempImg = new Image();
                tempImg.src = e.target.result;
                tempImg.onload = function() {
                    firmaAspectRatio = tempImg.width / tempImg.height;
                    
                    // Tamaño inicial prudente
                    let initialWidth = container.offsetWidth * 0.3; 
                    if(initialWidth < 80) initialWidth = 80;
                    
                    ghost.style.width = initialWidth + "px";
                    ghost.style.height = (initialWidth / firmaAspectRatio) + "px";
                    
                    if (previewStage.style.display !== 'none') {
                        resetGhostPosition();
                        ghost.style.display = 'block';
                    }
                }
            }
            reader.readAsDataURL(file);
            checkReady();
        }

        function resetGhostPosition() {
            // Centrar firma inicialmente
            const cw = container.offsetWidth;
            const ch = container.offsetHeight;
            const gw = ghost.offsetWidth;
            const gh = ghost.offsetHeight;
            
            ghost.style.left = (cw/2 - gw/2) + "px";
            ghost.style.top = (ch/2 - gh/2) + "px";
        }

        // ==========================================
        // LÓGICA DE MOVIMIENTO CORREGIDA
        // ==========================================

        function startDrag(clientX, clientY, target) {
            if (target === resizer || target.parentElement === resizer) {
                isResizing = true;
                startX = clientX;
                startWidth = ghost.offsetWidth;
            } else {
                isDragging = true;
                const rect = ghost.getBoundingClientRect();
                dragOffset.x = clientX - rect.left;
                dragOffset.y = clientY - rect.top;
            }
        }

        function moveDrag(clientX, clientY) {
            if (isDragging) {
                const rectContainer = container.getBoundingClientRect();
                
                // Calculamos nueva posición teórica
                let newLeft = clientX - rectContainer.left - dragOffset.x;
                let newTop = clientY - rectContainer.top - dragOffset.y;

                // LÍMITES ESTRICTOS (Clamp)
                // Math.max(0, ...) -> No menor que 0
                // Math.min(max, ...) -> No mayor que el ancho/alto contenedor
                const maxW = container.clientWidth - ghost.offsetWidth;
                const maxH = container.clientHeight - ghost.offsetHeight;

                newLeft = Math.max(0, Math.min(newLeft, maxW));
                newTop = Math.max(0, Math.min(newTop, maxH));

                ghost.style.left = newLeft + "px";
                ghost.style.top = newTop + "px";
            }

            if (isResizing) {
                const deltaX = clientX - startX;
                let newWidth = startWidth + deltaX;
                
                // Limites de resize
                const maxWidthAvailable = container.clientWidth - ghost.offsetLeft;
                
                if (newWidth > 40 && newWidth <= maxWidthAvailable) {
                    ghost.style.width = newWidth + "px";
                    ghost.style.height = (newWidth / firmaAspectRatio) + "px"; // Mantener ratio
                }
            }
        }

        function endDrag() {
            isDragging = false;
            isResizing = false;
        }

        // Listeners Globales para evitar que se "suelte" si mueves muy rápido
        // MOUSE
        ghost.addEventListener('mousedown', e => { e.preventDefault(); startDrag(e.clientX, e.clientY, e.target); });
        window.addEventListener('mousemove', e => { if(isDragging || isResizing) moveDrag(e.clientX, e.clientY); });
        window.addEventListener('mouseup', endDrag);

        // TOUCH (Celular)
        ghost.addEventListener('touchstart', e => {
            e.preventDefault(); 
            const touch = e.touches[0];
            startDrag(touch.clientX, touch.clientY, e.target);
        }, { passive: false });

        window.addEventListener('touchmove', e => {
            if (isDragging || isResizing) {
                e.preventDefault(); 
                const touch = e.touches[0];
                moveDrag(touch.clientX, touch.clientY);
            }
        }, { passive: false });
        
        window.addEventListener('touchend', endDrag);

        function checkReady() {
            const pdf = document.getElementById('pdfInput').files.length;
            const firm = document.getElementById('firmaInput').files.length;
            document.getElementById('btnFirmar').disabled = !(pdf && firm);
        }

        // ==========================================
        // PROCESAMIENTO PDF FINAL (Corregido)
        // ==========================================

        async function enviarFirma() {
            const btn = document.getElementById('btnFirmar');
            const status = document.getElementById('status');
            const pdfFile = document.getElementById('pdfInput').files[0];
            const firmFile = document.getElementById('firmaInput').files[0];
            const aplicarEnTodas = document.getElementById('checkAllPages').checked;

            if (!pdfFile || !firmFile) return;

            btn.disabled = true;
            btn.innerText = "Procesando...";
            status.innerText = "";

            try {
                // 1. Obtener datos geométricos PRECISOS del HTML
                // Usamos offsetLeft/Top relativos al contenedor
                const ghostX = ghost.offsetLeft;
                const ghostY = ghost.offsetTop;
                const ghostW = ghost.offsetWidth;
                const ghostH = ghost.offsetHeight;
                
                const containerW = container.offsetWidth;
                const containerH = container.offsetHeight;

                // Calculamos porcentajes (0.0 a 1.0)
                // X es porcentaje desde la izquierda
                const xPercent = ghostX / containerW;
                // Y es porcentaje desde ARRIBA
                const yPercentFromTop = ghostY / containerH;
                // W es porcentaje del ancho total
                const wPercent = ghostW / containerW;


                // 2. Procesar PDF con pdf-lib
                const pdfBytes = await pdfFile.arrayBuffer();
                const firmBytes = await firmFile.arrayBuffer();
                const pdfDocLib = await PDFLib.PDFDocument.load(pdfBytes);

                let firmaImage;
                if (firmFile.type.includes('jpeg') || firmFile.type.includes('jpg')) {
                    firmaImage = await pdfDocLib.embedJpg(firmBytes);
                } else {
                    firmaImage = await pdfDocLib.embedPng(firmBytes);
                }

                // 3. Estampar
                const pages = pdfDocLib.getPages();
                const indices = aplicarEnTodas ? pages.map((_, i) => i) : [pages.length - 1];

                indices.forEach(index => {
                    const page = pages[index];
                    const { width, height } = page.getSize();

                    // TRADUCCIÓN DE COORDENADAS (La magia para que no salga en la orilla)
                    
                    // 1. Ancho final en PDF
                    const pdfFirmaW = width * wPercent;
                    // 2. Alto proporcional (usando el aspect ratio de la imagen original)
                    const pdfFirmaH = pdfFirmaW / firmaAspectRatio;

                    // 3. Posición X (Izquierda a Derecha) -> Igual que en HTML
                    const pdfX = width * xPercent;

                    // 4. Posición Y (¡INVERTIDA!)
                    // En HTML (0,0) es Arriba-Izquierda.
                    // En PDF (0,0) es Abajo-Izquierda.
                    // Y_PDF = AlturaPagina - (DistanciaDesdeArriba_PDF) - AlturaFirma
                    
                    const distanciaDesdeArriba = height * yPercentFromTop;
                    const pdfY = height - distanciaDesdeArriba - pdfFirmaH;

                    page.drawImage(firmaImage, {
                        x: pdfX,
                        y: pdfY,
                        width: pdfFirmaW,
                        height: pdfFirmaH
                    });
                });

                const pdfBytesModificado = await pdfDocLib.save();
                const blob = new Blob([pdfBytesModificado], { type: "application/pdf" });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = pdfFile.name.replace(".pdf", "_firmado.pdf");
                document.body.appendChild(a);
                a.click();
                a.remove();

                status.style.color = "green";
                status.innerText = "¡Listo! Descarga iniciada.";

            } catch (err) {
                console.error(err);
                status.style.color = "red";
                status.innerText = "Error: " + err.message;
            } finally {
                btn.disabled = false;
                btn.innerText = "Firmar Documento ✍️";
            }
        }
    </script>
